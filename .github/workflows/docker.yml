name: Docker Build & Publish

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: osmitickets-stack/osmi-server

jobs:

  docker:

    name: Build & Publish Docker Image

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}

          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha

          labels: |
            org.opencontainers.image.title=OSMI Server
            org.opencontainers.image.description=OSMI gRPC Backend
            org.opencontainers.image.vendor=OSMI Tickets
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/osmitickets-stack/osmi-server
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile

          push: true

          platforms: linux/amd64

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false

      - name: Image summary
        run: |
          echo "Docker image published successfully."
          echo "Image:"
          echo "ghcr.io/${{ env.IMAGE_NAME }}"
